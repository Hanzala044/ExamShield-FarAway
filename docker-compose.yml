services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: examshield
      POSTGRES_PASSWORD: examshield
      POSTGRES_DB: examshield
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examshield"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://examshield:examshield@db:5432/examshield
      JWT_SECRET: dev-only-change-me
      # IntegrityAI: set these to use real Claude instead of the deterministic engine
      AI_USE_CLAUDE: "false"
      ANTHROPIC_API_KEY: ""
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8001
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
